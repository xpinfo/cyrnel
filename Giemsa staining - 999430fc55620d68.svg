<svg width="500" height="500" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e2a5e"/>
      <stop offset="100%" stop-color="#0f1638"/>
    </linearGradient>
    <linearGradient id="chromA" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7ec8e3"/>
      <stop offset="50%" stop-color="#3fa9dc"/>
      <stop offset="100%" stop-color="#1f78b4"/>
    </linearGradient>
    <linearGradient id="chromB" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffd66b"/>
      <stop offset="50%" stop-color="#ffb84d"/>
      <stop offset="100%" stop-color="#f2994a"/>
    </linearGradient>
  </defs>

  <!-- background circle badge -->
  <circle cx="250" cy="250" r="240" fill="url(#bg)"/>
  <circle cx="250" cy="250" r="240" fill="none" stroke="#3fa9dc" stroke-width="4" opacity="0.5"/>

  <!-- Left chromatid -->
  <path d="M190 90
           C 150 130, 220 165, 190 205
           C 160 245, 230 270, 195 310
           C 165 345, 220 375, 195 410"
        fill="none" stroke="url(#chromA)" stroke-width="34" stroke-linecap="round"/>

  <!-- Right chromatid -->
  <path d="M300 95
           C 340 135, 270 170, 300 210
           C 330 250, 265 280, 300 315
           C 330 350, 275 380, 300 410"
        fill="none" stroke="url(#chromB)" stroke-width="34" stroke-linecap="round"/>

  <!-- centromere connector -->
  <ellipse cx="245" cy="250" rx="46" ry="20" fill="#f4f1ea" opacity="0.9"/>

  <!-- subtle band marks -->
  <g stroke="#0f1638" stroke-width="3" opacity="0.35" stroke-linecap="round">
    <line x1="178" y1="120" x2="205" y2="120"/>
    <line x1="180" y1="160" x2="208" y2="160"/>
    <line x1="180" y1="300" x2="208" y2="300"/>
    <line x1="182" y1="340" x2="210" y2="340"/>
    <line x1="182" y1="380" x2="210" y2="380"/>

    <line x1="290" y1="125" x2="318" y2="125"/>
    <line x1="288" y1="165" x2="316" y2="165"/>
    <line x1="288" y1="300" x2="316" y2="300"/>
    <line x1="290" y1="340" x2="318" y2="340"/>
    <line x1="290" y1="378" x2="318" y2="378"/>
  </g>

  <!-- Label -->
  <text x="250" y="460" font-family="Helvetica, Arial, sans-serif" font-size="34" font-weight="700"
        fill="#f4f1ea" text-anchor="middle" letter-spacing="4">CHR 6</text>
</svg>
